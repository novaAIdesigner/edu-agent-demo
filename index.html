<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azure Foundry - Education Agent Demo</title>
  <link rel="icon" type="image/png" href="/ai-foundry.png" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="h-full bg-gray-950 text-gray-100 antialiased">
  <div id="app" class="flex h-full flex-col">

    <!-- Header -->
    <header class="flex-shrink-0 border-b border-gray-800 bg-gray-900/80 backdrop-blur-sm">
      <div class="mx-auto flex max-w-screen-2xl items-center justify-between px-4 py-3">
        <div class="flex items-center gap-3">
          <img src="/ai-foundry.png" alt="Azure AI Foundry" class="h-8 w-8" />
          <div>
            <h1 class="text-xl font-bold text-white leading-tight">Azure Foundry - Education Agent Demo</h1>
          </div>
          <span class="rounded-full bg-blue-500/15 px-2.5 py-0.5 text-[10px] font-semibold text-blue-400 ring-1 ring-blue-500/30">Preview</span>
        </div>
        <div id="header-status" class="flex items-center gap-4 text-sm">
          <div class="flex items-center gap-1.5">
            <span class="inline-block h-2 w-2 rounded-full bg-gray-600" id="conn-dot"></span>
            <span id="conn-label" class="text-gray-400">Disconnected</span>
          </div>
          <div class="flex items-center gap-1.5">
            <span id="assistant-status" class="text-gray-400">Idle</span>
          </div>
          <button id="settings-toggle" class="rounded-lg border border-gray-700 bg-gray-800 px-3 py-1.5 text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white transition-colors">
            <svg class="inline-block h-4 w-4 mr-1 -mt-0.5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.84 1.804A1 1 0 0 1 8.82 1h2.36a1 1 0 0 1 .98.804l.331 1.652a6.993 6.993 0 0 1 1.929 1.115l1.598-.54a1 1 0 0 1 1.186.447l1.18 2.044a1 1 0 0 1-.205 1.251l-1.267 1.113a7.047 7.047 0 0 1 0 2.228l1.267 1.113a1 1 0 0 1 .206 1.25l-1.18 2.045a1 1 0 0 1-1.187.447l-1.598-.54a6.993 6.993 0 0 1-1.929 1.115l-.33 1.652a1 1 0 0 1-.98.804H8.82a1 1 0 0 1-.98-.804l-.331-1.652a6.993 6.993 0 0 1-1.929-1.115l-1.598.54a1 1 0 0 1-1.186-.447l-1.18-2.044a1 1 0 0 1 .205-1.251l1.267-1.114a7.05 7.05 0 0 1 0-2.227L1.821 7.773a1 1 0 0 1-.206-1.25l1.18-2.045a1 1 0 0 1 1.187-.447l1.598.54A6.992 6.992 0 0 1 7.51 3.456l.33-1.652ZM10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd"/></svg>Settings
          </button>
        </div>
      </div>
    </header>

    <!-- Main content area -->
    <div class="flex flex-1 overflow-hidden">

      <!-- Settings Sidebar (hidden by default) -->
      <aside id="settings-sidebar" class="hidden w-80 flex-shrink-0 overflow-y-auto border-r border-gray-800 bg-gray-900 p-4">
        <div id="settings-container"></div>
      </aside>

      <!-- Main content -->
      <main class="flex flex-1 flex-col overflow-hidden">
        <!-- Tab Navigation -->
        <nav id="tab-nav" class="flex-shrink-0 border-b border-gray-800 bg-gray-900/60 backdrop-blur-sm">
          <div class="mx-auto flex max-w-screen-2xl gap-0 overflow-x-auto px-4" id="tab-buttons"></div>
        </nav>

        <!-- Tab Content Panels -->
        <div id="tab-content" class="flex-1 overflow-y-auto">
          <!-- Scenario panels rendered by JS -->
        </div>
      </main>
    </div>

    <!-- Error Modal -->
    <div id="error-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm">
      <div class="mx-4 max-w-md rounded-xl border border-gray-700 bg-gray-900 p-6 shadow-2xl">
        <h3 class="mb-2 text-lg font-semibold text-red-400">Error</h3>
        <p id="error-message" class="mb-4 text-sm text-gray-300"></p>
        <button id="error-close" class="w-full rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-500 transition-colors">
          Close
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
